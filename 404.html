<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Histudy</title>
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?p=' +
        encodeURIComponent(l.pathname.slice(1)) + l.search + l.hash
      );
    </script>
  </head>
</html>
